name: Automated Data Preprocessing
on:
  push:
    paths:
      - 'dataset_raw/**'
      - 'preprocessing/automate_*.py'
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  preprocess:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn
          
      - name: Run preprocessing script
        run: |
          cd preprocessing
          python automate_rafli.py
          
      - name: Commit and Push Processed Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dataset_preprocessing/
          git commit -m "Auto-update processed dataset" || echo "No changes to commit"
          git push
